name: Generate & Upload Fruits Short

on:
  schedule:
    - cron: '0 9 * * 1,3,5'   # Mon, Wed, Fri at 9AM UTC
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Step 1 - Generate Short Script (Gemini AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/1_generate_script.py

      - name: Step 2 - Generate Natural Voice (Edge TTS)
        run: python scripts/2_generate_voice.py

      - name: Step 3 - Generate Vertical Images (Pollinations AI)
        run: python scripts/3_generate_images.py

      - name: Step 4 - Assemble Interactive Shorts Video
        run: python scripts/4_assemble_video.py

      - name: Step 5 - Upload to YouTube Shorts
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/5_upload_youtube.py

      - name: Save progress
        run: |
          git config --global user.name "Fruits Bot"
          git config --global user.email "bot@fruitsbot.com"
          git add done.txt
          git diff --staged --quiet || git commit -m "Auto: marked fruit as done"
          git push
